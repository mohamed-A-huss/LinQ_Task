<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML Form Example</title>
</head>

<body>

<h1>HTML Form Example</h1>

<p>
This is an example of an <del>HTML4</del> <u>HTML5</u> form containing يحتوي various <mark>input</mark> controls:
</p>

<form>


<fieldset>
<legend>User Information</legend>

<label>Username:</label>
<input type="text" name="username"><br><br>

<label>Email:</label>
<input type="email" name="email"><br><br>

<label>Password:</label>
<input type="password" name="password"><br><br>

</fieldset>


<fieldset>
<legend>Contact Information</legend>

<label>Phone:</label>
<input type="tel" name="phone"><br><br>

<label>Message:</label><br>
<textarea name="message" rows="5" cols="40"></textarea>

</fieldset>


<fieldset>
<legend>Subscription</legend>

<label>Subscribe to newsletter:</label>
<input type="checkbox" name="subscribe1"><br>

<label>Subscribe to newsletter:</label>
<input type="checkbox" name="subscribe2">

</fieldset>


<fieldset>
<legend>Preferred Language</legend>

<label>Select your preferred language:</label>

<select name="language">
<option>English</option>
<option>Spanish</option>
<option>French</option>
<option>German</option>
</select>

</fieldset>


<fieldset>
<legend>Feedback</legend>

<label>Rate our service:</label>
<input type="range" min="0" max="10">

</fieldset>

<br>

<input type="submit" value="Submit">
<input type="reset" value="Reset">

</form>

</body>
</html>
